name: client-portal-be

services:
  backend-app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: client-portal-be-app
    init: true
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: ["/usr/local/bin/backend-entrypoint"]
    command: ["php", "-S", "0.0.0.0:8000", "-t", "public", "docker/app/router.php"]
    environment:
      APP_KEY: base64:o0j6ZRhOLfC5hz+j4KB38B2jW7sMakruqfkhbBywlfs=
      APP_NAME: client-portal-be
      APP_ENV: local
      APP_DEBUG: 'false'
      APP_URL: http://127.0.0.1:8000
      BE_DEPLOYMENT_ID: compose-local
      CACHE_STORE: file
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      FRONTEND_APP_URL: http://127.0.0.1:3000
      KEYCLOAK_BASE_URL: https://sso.skill-wanderer.com
      KEYCLOAK_CLIENT_ID: client-portal-fe
      KEYCLOAK_CLIENT_SECRET: ''
      KEYCLOAK_REALM: client-portal
      KEYCLOAK_FRONTEND_DASHBOARD_URL: http://127.0.0.1:3000/dashboard
      KEYCLOAK_REDIRECT_URI: http://127.0.0.1:8000/v1/auth/callback
      LOG_CHANNEL: stack
      LOG_STACK: stderr
      PHP_CLI_SERVER_WORKERS: '4'
      QUEUE_CONNECTION: sync
      SESSION_DOMAIN: 'null'
      SESSION_DRIVER: file
      SESSION_HTTP_ONLY: 'true'
      SESSION_PATH: /
      SESSION_SAME_SITE: lax
      SESSION_SECURE_COOKIE: 'null'
      TRUSTED_PROXIES: REMOTE_ADDR
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/up > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - '127.0.0.1:8000:8000'
