apiVersion: v1
kind: ConfigMap
metadata:
  name: client-portal-be-config
  namespace: client-portal
  labels:
    app.kubernetes.io/name: client-portal-be
    app.kubernetes.io/part-of: client-portal
    app.kubernetes.io/component: backend
data:
  APP_NAME: "Client Portal Backend"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://api.skill-wanderer.com"
  FRONTEND_APP_URL: "https://client.skill-wanderer.com"
  CORS_ALLOWED_ORIGINS: "https://client.skill-wanderer.com"
  TRUSTED_PROXIES: "*"
  LOG_CHANNEL: "stderr"
  LOG_STACK: "stderr"
  LOG_LEVEL: "info"
  DB_CONNECTION: "sqlite"
  DB_DATABASE: "/var/www/html/database/database.sqlite"
  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: "/"
  SESSION_DOMAIN: "null"
  SESSION_HTTP_ONLY: "true"
  SESSION_SAME_SITE: "lax"
  SESSION_SECURE_COOKIE: "null"
  CACHE_STORE: "file"
  QUEUE_CONNECTION: "sync"
  KEYCLOAK_BASE_URL: "https://sso.skill-wanderer.com"
  KEYCLOAK_REALM: "client-portal"
  KEYCLOAK_CLIENT_ID: "client-portal-be"
  KEYCLOAK_REDIRECT_URI: "https://api.skill-wanderer.com/v1/auth/callback"
  KEYCLOAK_FRONTEND_DASHBOARD_URL: "https://client.skill-wanderer.com/dashboard"
  KEYCLOAK_ALLOWED_ROLES: "client,admin"
  KEYCLOAK_TIMEOUT: "10"
  BE_DEPLOYMENT_ID: "client-portal-be-0.1.6"
  CONTRACT_VERSION: "2026-05-21"
