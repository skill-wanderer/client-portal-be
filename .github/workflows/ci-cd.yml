name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/skill-wanderer/client-portal-be

jobs:
  test-build-publish:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: 'true'
      APP_URL: http://localhost
      APP_MAINTENANCE_DRIVER: file
      BCRYPT_ROUNDS: '4'
      BE_DEPLOYMENT_ID: backend-test-deploy
      CACHE_STORE: array
      CONTRACT_VERSION: contract-test-v1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      FRONTEND_APP_URL: http://localhost:3000
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: Prepare Laravel writable directories
        run: |
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Clear Laravel config
        run: php artisan config:clear

      - name: Run tests
        run: php artisan test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/skill-wanderer/client-portal-be
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
